name: Build Pakistan IPTV Playlist

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager

      - name: Run stream scanner
        run: |
          python pakistan_stream_scanner.py

      - name: Commit playlist
        run: |
          git config --global user.name "iptv-bot"
          git config --global user.email "bot@github.com"
          git add playlist/
          git commit -m "Update Pakistan streams" || echo "No changes"
          git push
