name: Build Pakistan IPTV Playlist

on:
  workflow_dispatch:   # Manual run only

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Pakistan stream scanner
        run: |
          python pakistan_stream_scanner.py

      - name: Commit updated playlist
        run: |
          git config --global user.name "iptv-bot"
          git config --global user.email "bot@github.com"
          git add playlist/
          git commit -m "Update Pakistan IPTV playlist" || echo "No changes"
          git push
