name: Update IPTV Playlist

on:
  schedule:
    - cron: "0 2 * * *"   # runs daily
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Requests
        run: pip install requests

      - name: Build Playlist
        run: python build_playlist.py

      - name: Commit Changes
        run: |
          git config --global user.name "playlist-bot"
          git config --global user.email "bot@github.com"
          git add playlist/allchannels.m3u
          git commit -m "Daily playlist update" || echo "No changes"
          git push
